<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Player Info</title>
<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
    text-align: center;
}
.nav {
    display:flex; justify-content:space-between;
    padding:15px 30px; border-bottom:1px solid #1f2933;
}
.nav .left { font-weight:bold; color:#58a6ff; }
.nav .right a { margin-left:20px; text-decoration:none; color:#c9d1d9; }
.nav .right a.active { background:#2b3240; padding:6px 10px; border-radius:6px; }

.header { padding:40px 20px; }
.header h1 { font-size:42px; margin:0; display:flex; align-items:center; justify-content:center; }
.flag { width:32px; height:20px; margin-left:12px; border-radius:4px; object-fit:cover; vertical-align:middle; }

.container { max-width:800px; margin:0 auto; padding:20px; text-align:center; }
.playerInfo { margin-bottom:30px; }
.playerInfo div { margin:6px 0; }
.playerInfo a { color:#58a6ff; text-decoration:none; }
.playerInfo a:hover { text-decoration:underline; }

.completions {
    margin-top:20px;
    text-align:left;
}
.completions h3 { color:#79c0ff; margin-bottom:6px; }
.completions ul { list-style:none; padding-left:0; }
.completions li { background:#11161c; padding:8px 12px; margin-bottom:5px; border-radius:8px; border:1px solid #1f2933; }
.completions li a { color:#58a6ff; text-decoration:none; }
.completions li a:hover { text-decoration:underline; }
</style>
</head>
<body>

<div class="nav">
    <div class="left"><a href="index.html">Mario's Custom Demonlist</a></div>
    <div class="right">
        <a href="main.html">Main List</a>
        <a href="extended.html">Extended</a>
        <a href="legacy.html">Legacy</a>
        <a class="active" href="leaderboard.html">Leaderboard</a>
        <a href="#">Submit</a>
    </div>
</div>

<div class="header">
    <h1 id="playerName">Player Name</h1>
    <img id="playerFlag" class="flag" src="https://via.placeholder.com/32x20?text=?" title="Unknown">
</div>

<div class="container playerInfo">
    <div id="playerRank">Rank: 0</div>
    <div id="playerPoints">Points: 0</div>
    <div>YouTube: <a id="playerYoutube" href="#" target="_blank">N/A</a></div>
</div>

<div class="container completions">
    <h3>Verifications</h3>
    <ul id="playerVerified"><li style="color:#8b949e;">None yet</li></ul>

    <h3>Main Completions</h3>
    <ul id="playerMain"><li style="color:#8b949e;">No completions yet.</li></ul>

    <h3>Extended Completions</h3>
    <ul id="playerExtended"><li style="color:#8b949e;">No completions yet.</li></ul>

    <h3>Legacy Completions</h3>
    <ul id="playerLegacy"><li style="color:#8b949e;">No completions yet.</li></ul>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const username = params.get("user"); // e.g., ?user=PlayerOne

function loadGameData(callback) {
    const old = document.getElementById('levelsScript');
    if (old) old.remove();
    const script = document.createElement('script');
    script.id = 'levelsScript';
    script.src = 'levels.js?v=' + Date.now();
    script.onload = callback;
    document.body.appendChild(script);
}

function renderPlayer() {
    if (!window.gameData) return;

    const player = gameData.leaderboard.find(p => p.username === username);
    if (!player) {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Player Not Found</h2>";
        return;
    }

    // Player basic info
    document.getElementById("playerName").innerText = player.username;
    document.getElementById("playerRank").innerText = `Rank: ${player.rank}`;
    document.getElementById("playerPoints").innerText = `Points: ${player.points}`;

    // Player flag
    const flagEl = document.getElementById("playerFlag");
    if (player.countryCode) {
        flagEl.src = `https://flagcdn.com/w20/${player.countryCode.toLowerCase()}.png`;
        flagEl.title = player.country || 'Unknown';
    } else {
        flagEl.src = 'https://via.placeholder.com/32x20?text=?';
        flagEl.title = 'Unknown';
    }

    // YouTube link
    const youtubeEl = document.getElementById("playerYoutube");
    if (player.youtube) {
        youtubeEl.href = player.youtube;
        youtubeEl.innerText = player.youtube;
        youtubeEl.style.color = "#58a6ff";
    } else {
        youtubeEl.href = "#";
        youtubeEl.innerText = "N/A";
        youtubeEl.style.color = "#8b949e";
    }

    // Verifications
    const verifContainer = document.getElementById("playerVerified");
    if (player.verifications && player.verifications.length > 0) {
        verifContainer.innerHTML = player.verifications.map(v => `<li>${v}</li>`).join("");
    } else {
        verifContainer.innerHTML = "<li style='color:#8b949e;'>None yet</li>";
    }

    // Render level completions as clickable links
    function renderLevels(ids, containerId) {
        const container = document.getElementById(containerId);
        if (!ids || ids.length === 0) {
            container.innerHTML = "<li style='color:#8b949e;'>No completions yet.</li>";
            return;
        }
        container.innerHTML = ids.map(id => {
            const level = gameData.getLevelById(id);
            if (!level) return "";
            const videoLink = level.video
                ? `https://www.youtube.com/watch?v=${level.video}`
                : "#";
            const videoText = level.video ? "Watch Video" : "No video yet";
            return `<li>
                        <a href="level.html?level=${level.id}">${level.title} (${level.difficulty})</a>
                        - <a href="${videoLink}" target="_blank" style="color:#79c0ff; text-decoration:none;">${videoText}</a>
                    </li>`;
        }).join("");
    }

    renderLevels(player.mainCompletions || [], "playerMain");
    renderLevels(player.extendedCompletions || [], "playerExtended");
    renderLevels(player.legacyCompletions || [], "playerLegacy");
}

loadGameData(renderPlayer);
</script>

</body>
</html>
