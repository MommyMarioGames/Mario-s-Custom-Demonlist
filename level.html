<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level Browser</title>

<style>
body {
    background: #0b0f14;
    color: #e6edf3;
    font-family: "Comic Sans MS", Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
}
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #1f2933;
}
.nav .left { font-weight: bold; color:#58a6ff; }
.nav .right a { margin-left:20px; text-decoration:none; color:#c9d1d9; }
.nav .right a.active { background:#2b3240; padding:6px 10px; border-radius:6px; }
.header { text-align: center; padding: 30px 20px; }
.header h1 { font-size:42px; margin:0; }
.header p { color:#8b949e; }
.container { max-width: 900px; margin: 0 auto 50px auto; padding: 20px; text-align: center; }
.title { font-size: 36px; font-weight: bold; color: #79c0ff; margin-bottom: 5px; }
.creator { font-size:16px; color:#8b949e; margin-bottom:20px; }
.video { width:100%; max-width:800px; height:480px; border-radius:10px; border:none; margin-bottom:30px; }
.section { margin-bottom:30px; text-align:left; }
.section h3 { font-size:18px; margin-bottom:10px; color:#79c0ff; }
.stat { color:#c9d1d9; margin:4px 0; }
.tag { display:inline-block; background:#8b1e1e; padding:5px 12px; border-radius:999px; font-size:13px; margin:3px 3px 3px 0; }
</style>
</head>
<body>

<div class="nav">
    <div class="left"><a href="index.html">Mario's Custom Demonlist</a></div>
    <div class="right">
        <a href="main.html">Main List</a>
        <a href="#">Extended</a>
        <a href="#">Legacy</a>
        <a href="#">Leaderboard</a>
        <a href="#">Submit</a>
    </div>
</div>

<div class="header">
    <h1>Level Info</h1>
    <p>you should see a level here...</p>
</div>

<div class="container">
    <div class="title" id="levelTitle"></div>
    <div class="creator" id="levelCreator"></div>
    <iframe class="video" id="levelVideo" allowfullscreen></iframe>

    <div class="section">
        <h3>Stats</h3>
        <div class="stat" id="levelPoints"></div>
        <div class="stat" id="levelPosition"></div>
        <div class="stat" id="levelDifficulty"></div>
    </div>

    <div class="section">
        <h3>Packs / Tags</h3>
        <div id="levelTags"></div>
    </div>

    <div class="section">
        <h3>Description</h3>
        <div id="levelDescription"></div>
    </div>
</div>

<script>
function renderLevel() {
    const params = new URLSearchParams(window.location.search);
    const levelId = Number(params.get('level'));

    if (!window.gameData) {
        console.error("gameData is NOT loaded");
        return;
    }

    // Combine all level arrays into one list for easy lookup
    const allLevels = [
        ...gameData.main,
        ...gameData.extended,
        ...gameData.legacy
    ];

    const level = allLevels.find(l => l.id === levelId);

    if (level) {
        document.getElementById('levelTitle').innerText = level.title;
        document.getElementById('levelCreator').innerText = `by ${level.creator}`;
        document.getElementById('levelVideo').src = `https://www.youtube.com/embed/${level.video}`;
        document.getElementById('levelPoints').innerText = `Points: ${level.points}`;
        document.getElementById('levelPosition').innerText = `Position: ${level.position}`;
        document.getElementById('levelDifficulty').innerText = `Difficulty: ${level.difficulty}`;
        document.getElementById('levelTags').innerHTML =
            level.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
        document.getElementById('levelDescription').innerText = level.description;

        // === New: Completed By Section ===
        const completedByContainer = document.getElementById('levelCompletedBy');
        const completedPlayers = gameData.leaderboard.filter(player => {
            return (player.mainCompletions && player.mainCompletions.includes(level.id)) ||
                   (player.extendedCompletions && player.extendedCompletions.includes(level.id)) ||
                   (player.legacyCompletions && player.legacyCompletions.includes(level.id));
        });

        if (completedPlayers.length === 0) {
            completedByContainer.innerHTML = "<li style='color:#8b949e;'>No one has completed this level yet.</li>";
        } else {
            completedByContainer.innerHTML = completedPlayers.map(p => {
                return `<li><a href="player.html?user=${p.username}" style="color:#58a6ff; text-decoration:none;">
                            ${p.username} (Rank: ${p.rank})
                        </a></li>`;
            }).join('');
        }
    } else {
        document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>LEVEL NOT FOUND</h2>";
    }
}

// Load script + render
function loadLevelsScript(callback) {
    const old = document.getElementById('levelsScript');
    if (old) old.remove();

    const script = document.createElement('script');
    script.id = 'levelsScript';
    script.src = 'levels.js?v=' + Date.now();
    script.onload = callback;
    document.body.appendChild(script);
}

loadLevelsScript(renderLevel);
</script>

</body>
</html>
