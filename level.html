<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Level</title>

<style>
body {
    background: #0b0f14;
    color: #e6edf3;
    font-family: "Comic Sans MS", Arial, sans-serif;
    margin: 0;
    padding: 0;
    text-align: center;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #1f2933;
}
.nav .left { font-weight: bold; color:#58a6ff; }
.nav .right a { margin-left:20px; text-decoration:none; color:#c9d1d9; }
.nav .right a.active { background:#2b3240; padding:6px 10px; border-radius:6px; }

/* HEADER */
.header {
    text-align: center;
    padding: 30px 20px;
}
.header h1 { font-size:42px; margin:0; }
.header p { color:#8b949e; }

/* LEVEL CONTENT */
.container {
    max-width: 900px;
    margin: 0 auto 50px auto;
    padding: 20px;
    text-align: center;
}

/* Title & creator */
.title {
    font-size: 36px;
    font-weight: bold;
    color: #79c0ff;
    margin-bottom: 5px;
}
.creator {
    font-size: 16px;
    color: #8b949e;
    margin-bottom: 20px;
}

/* Video */
.video {
    width: 100%;
    max-width: 800px;
    height: 480px;
    border-radius: 10px;
    border: none;
    margin-bottom: 30px;
}

/* Sections */
.section {
    margin-bottom: 30px;
    text-align: left;
}
.section h3 {
    font-size: 18px;
    margin-bottom: 10px;
    color: #79c0ff;
}

/* Stats */
.stat {
    color: #c9d1d9;
    margin: 4px 0;
}

/* Tags */
.tag {
    display: inline-block;
    background: #8b1e1e;
    padding: 5px 12px;
    border-radius: 999px;
    font-size: 13px;
    margin: 3px 3px 3px 0;
}
</style>
</head>
<body>

<!-- NAV -->
<div class="nav">
    <div class="left"><a href="index.html">Mario's Custom Demonlist</a></div>
    <div class="right">
        <a href="index.html">Main List</a>
        <a href="#">Extended</a>
        <a href="#">Legacy</a>
        <a href="#">Leaderboard</a>
        <a href="#">Submit</a>
    </div>
</div>

<!-- HEADER -->
<div class="header">
    <h1>Level Info</h1>
    <p>Check out this insane demon!</p>
</div>

<!-- LEVEL CONTENT -->
<div class="container">
    <div class="title" id="levelTitle"></div>
    <div class="creator" id="levelCreator"></div>
    <iframe class="video" id="levelVideo" allowfullscreen></iframe>

    <div class="section">
        <h3>Stats</h3>
        <div class="stat" id="levelPoints"></div>
        <div class="stat" id="levelPosition"></div>
        <div class="stat" id="levelDifficulty"></div>
    </div>

    <div class="section">
        <h3>Packs / Tags</h3>
        <div id="levelTags"></div>
    </div>

    <div class="section">
        <h3>Description</h3>
        <div id="levelDescription"></div>
    </div>
</div>

<script>
// 🔹 Level data
const levels = [
    {
        id: 1,
        title: "1. fucking level",
        creator: "kanye idk",
        thumbnail: "simpsion.jpeg",
        video: "zDjpcmvZbTM", // YouTube ID
        points: 250,
        position: 1,
        difficulty: "demon insert here",
        tags: ["a TAG WOW"],
        description: "description."
    },
    {
        id: 2,
        title: "2. another level",
        creator: "someone else",
        thumbnail: "simpsion2.jpeg",
        video: "ANOTHER_VIDEO_ID",
        points: 200,
        position: 2,
        difficulty: "hard demon",
        tags: ["Favorites", "Demon"],
        description: "Another description."
    }
];

// 🔹 Get level ID from URL and convert to number
const params = new URLSearchParams(window.location.search);
const levelId = Number(params.get('level')); // <-- important fix
const level = levels[levelId];

// 🔹 Load level data
if(level) {
    document.getElementById('levelTitle').innerText = level.title;
    document.getElementById('levelCreator').innerText = `by ${level.creator}`;
    document.getElementById('levelVideo').src = `https://www.youtube.com/embed/${level.video}`;
    document.getElementById('levelPoints').innerText = `Points: ${level.points}`;
    document.getElementById('levelPosition').innerText = `Position: ${level.position}`;
    document.getElementById('levelDifficulty').innerText = `Difficulty: ${level.difficulty}`;
    document.getElementById('levelTags').innerHTML = level.tags.map(tag => `<span class="tag">${tag}</span>`).join('');
    document.getElementById('levelDescription').innerText = level.description;
} else {
    document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Level not found</h2>";
}
</script>

</body>
</html>
