<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Leaderboard</title>
<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
}
.nav {
    display:flex; justify-content:space-between;
    padding:15px 30px; border-bottom:1px solid #1f2933;
}
.nav .left { font-weight:bold; color:#58a6ff; }
.nav .right a { margin-left:20px; text-decoration:none; color:#c9d1d9; }
.nav .right a.active { background:#2b3240; padding:6px 10px; border-radius:6px; }
.header { text-align:center; padding:40px 20px; }
.header h1 { font-size:42px; margin:0; }
.header p { color:#8b949e; margin-top:6px; }
.list { max-width:900px; margin:auto; padding:20px; }
.card {
    display:flex; align-items:center;
    background:#11161c; border:1px solid #1f2933;
    border-radius:10px; margin-bottom:15px; padding:10px;
    cursor:pointer; transition:background 0.2s;
}
.card:hover { background:#1f2330; }
.rank { font-size:24px; font-weight:bold; width:50px; text-align:center; color:#79c0ff; }
.pfp { width:60px; height:60px; border-radius:50%; object-fit:cover; margin-right:15px; border:2px solid #1f2933; }
.flag { width:32px; height:20px; margin-right:8px; border-radius:4px; object-fit:cover; vertical-align:middle; }
.content { flex:1; display:flex; flex-direction:column; }
.user { font-size:20px; color:#79c0ff; display:flex; align-items:center; gap:6px; }
.points { font-size:14px; color:#8b949e; margin-top:5px; }
@media (max-width:600px) {
    .card { flex-direction:column; align-items:flex-start; }
    .pfp { margin:0 0 10px 0; }
    .rank { width:auto; margin-bottom:5px; }
    .user { font-size:18px; }
}
</style>
</head>
<body>

<div class="nav">
    <div class="left"><a href="index.html">Mario's Custom Demonlist</a></div>
    <div class="right">
        <a href="main.html">Main List</a>
        <a href="#">Extended</a>
        <a href="#">Legacy</a>
        <a class="active" href="leaderboard.html">Leaderboard</a>
        <a href="#">Submit</a>
    </div>
</div>

<div class="header">
    <h1>Leaderboard</h1>
    <p>See who’s on top!</p>
</div>

<div class="list" id="leaderboardList"></div>

<script>
function renderLeaderboard() {
    const container = document.getElementById('leaderboardList');
    if (!window.gameData || !gameData.leaderboard) return;
    container.innerHTML = '';

    gameData.leaderboard.forEach(user => {
        const flagUrl = user.countryCode 
            ? `https://flagcdn.com/w20/${user.countryCode.toLowerCase()}.png`
            : 'https://via.placeholder.com/20x14?text=?';

        const card = document.createElement('div');
        card.className = 'card';
        card.onclick = () => window.location.href = `player.html?user=${encodeURIComponent(user.username)}`;

        const pfpUrl = user.pfp ? user.pfp : 'https://via.placeholder.com/60?text=?';

        card.innerHTML = `
            <div class="rank">${user.rank}</div>
            <img class="pfp" src="${pfpUrl}" alt="${user.username}'s PFP">
            <div class="content">
                <div class="user">
                    <img class="flag" src="${flagUrl}" title="${user.country || 'Unknown'}">
                    ${user.username}
                </div>
                <div class="points">Points: ${user.points}</div>
            </div>
        `;
        container.appendChild(card);
    });
}

// Keep flags dynamic if countries update
(function watchFlags() {
    if (!window.gameData) return;
    const originalFn = gameData.setPlayerCountry;
    gameData.setPlayerCountry = function(username, countryCode, countryName) {
        originalFn.call(this, username, countryCode, countryName);
        const imgs = document.querySelectorAll(`.flag`);
        imgs.forEach(img => {
            if (img.title === username || img.dataset.username === username) {
                img.src = countryCode
                    ? `https://flagcdn.com/w20/${countryCode.toLowerCase()}.png`
                    : 'https://via.placeholder.com/20x14?text=?';
                img.title = countryName || 'Unknown';
            }
        });
    };
})();

function loadDataScript(callback) {
    const old = document.getElementById('levelsScript');
    if (old) old.remove();
    const script = document.createElement('script');
    script.id = 'levelsScript';
    script.src = 'levels.js?v=' + Date.now();
    script.onload = callback;
    document.body.appendChild(script);
}

// Initial render
loadDataScript(renderLeaderboard);
</script>

</body>
</html>
