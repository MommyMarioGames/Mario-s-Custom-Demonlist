<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>main list</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
}
.nav {
    display:flex; justify-content:space-between;
    padding:15px 30px; border-bottom:1px solid #1f2933;
}
.nav .left { font-weight:bold; color:#58a6ff; }
.nav .right a { margin-left:20px; text-decoration:none; color:#c9d1d9; }
.nav .right a.active { background:#2b3240; padding:6px 10px; border-radius:6px; }
.header { text-align:center; padding:40px 20px; }
.header h1 { font-size:42px; margin:0; }
.header p { color:#8b949e; }
.list { max-width:1100px; margin:auto; padding:20px; }
.card {
    display:flex; background:#11161c; border:1px solid #1f2933;
    border-radius:10px; margin-bottom:20px; overflow:hidden; cursor:pointer;
}
.thumbnail { width:220px; height:120px; background:#222; object-fit:cover; }
.content { padding:15px; flex:1; }
.title { font-size:20px; color:#79c0ff; }
.points { font-size:14px; color:#8b949e; }
.tags { margin-top:10px; }
.tag {
    display:inline-block; background:#8b1e1e; color:white;
    padding:4px 10px; border-radius:999px; font-size:12px; margin:3px;
}
@media (max-width:800px) {
    .card { flex-direction:column; }
    .thumbnail { width:100%; }
}
</style>
</head>

<body>

<div class="nav">
    <div class="left"><a href="index.html">Mario's Custom Demonlist</a></div>
    <div class="right">
        <a class="active" href="#">Main List</a>
        <a href="extended.html">Extended</a>
        <a href="legacy.html">Legacy</a>
        <a href="leaderboard.html">Leaderboard</a>
        <a href="#">Submit</a>
    </div>
</div>

<div class="header">
    <h1>Main List</h1>
    <p>WOW THE MAIN LIST NO WAY!!</p>
</div>

<div class="list" id="levelList"></div>

<script>
// Choose which section to display: 'main', 'extended', 'legacy', or 'leaderboard'
const section = 'main';

function renderList() {
    const container = document.getElementById('levelList');
    if (!window.gameData) return;

    container.innerHTML = '';
    const items = gameData[section] || [];

    items.forEach(item => {
        const card = document.createElement('div');
        card.className = 'card';

        if (section === 'leaderboard') {
            // leaderboard shows users
            card.innerHTML = `
                <img class="thumbnail" src="${item.icon || 'images/default-user.png'}">
                <div class="content">
                    <div class="title">${item.rank}. ${item.user}</div>
                    <div class="points">Points: ${item.points}</div>
                </div>
            `;
        } else {
            // levels
            card.onclick = () => window.location.href = `level.html?level=${item.id}`;
            card.innerHTML = `
                <img class="thumbnail" src="${item.thumbnail}">
                <div class="content">
                    <div class="title">${item.title}</div>
                    <div class="points">Points: ${item.points}</div>
                    <div class="tags">
                        ${(item.tags || []).map(tag => `<span class="tag">${tag}</span>`).join('')}
                    </div>
                </div>
            `;
        }

        container.appendChild(card);
    });
}

// dynamically load the data script
function loadDataScript(callback) {
    const old = document.getElementById('levelsScript');
    if (old) old.remove();

    const script = document.createElement('script');
    script.id = 'levelsScript';
    script.src = 'levels.js?v=' + Date.now();
    script.onload = callback;
    document.body.appendChild(script);
}

// load the page
loadDataScript(renderList);
</script>

</body>
</html>
