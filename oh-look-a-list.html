<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Main List</title>

<style>
body {
    margin: 0;
    font-family: "Comic Sans MS", Arial, sans-serif;
    background: #0b0f14;
    color: #e6edf3;
}

/* NAV */
.nav {
    display: flex;
    justify-content: space-between;
    padding: 15px 30px;
    border-bottom: 1px solid #1f2933;
}
.nav .left {
    font-weight: bold;
    color: #58a6ff;
}
.nav .right a {
    margin-left: 20px;
    text-decoration: none;
    color: #c9d1d9;
}
.nav .right a.active {
    background: #2b3240;
    padding: 6px 10px;
    border-radius: 6px;
}

/* TITLE */
.header {
    text-align: center;
    padding: 40px 20px;
}
.header h1 {
    font-size: 42px;
}
.header p {
    color: #8b949e;
}

/* LIST */
.list {
    max-width: 1100px;
    margin: auto;
    padding: 20px;
}
.card {
    display: flex;
    background: #11161c;
    border: 1px solid #1f2933;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
    cursor: pointer;
}
.thumbnail {
    width: 220px;
    height: 120px;
    background: #222;
}
.content {
    padding: 15px;
    flex: 1;
}
.title {
    font-size: 20px;
    color: #79c0ff;
}
.points {
    font-size: 14px;
    color: #8b949e;
}
.tags {
    margin-top: 10px;
}
.tag {
    display: inline-block;
    background: #8b1e1e;
    color: white;
    padding: 4px 10px;
    border-radius: 999px;
    font-size: 12px;
    margin: 3px;
}
.tag.gray {
    background: #444c56;
}
.weekly {
    margin-top: 10px;
    font-size: 12px;
    color: #8b949e;
}

@media (max-width: 800px) {
    .card {
        flex-direction: column;
    }
    .thumbnail {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="nav">
    <div class="left"><a href="index.html">Mario's Custom Demonlist</a></div>
    <div class="right">
        <a class="active" href="#">Main List</a>
        <a href="#">Extended</a>
        <a href="#">Legacy</a>
        <a href="#">Leaderboard</a>
        <a href="#">Submit</a>
    </div>
</div>

<div class="header">
    <h1>Main List</h1>
    <p>WOW THE MAIN LIST NO WAY!!!</p>
</div>

<div class="list" id="levelList"></div>

        difficulty: "demon inersert here",
        tags: ["a TAG WOW"],
        description: "description."
    },

// 🔹 Dynamically create cards
const levelList = document.getElementById('levelList');

levels.forEach(level => {
    const card = document.createElement('div');
    card.className = 'card';

    // Click opens dynamic level.html with the level ID
    card.onclick = () => {
        window.location.href = `level.html?level=${level.id}`;
    }

    card.innerHTML = `
        <img class="thumbnail" src="${level.thumbnail}">
        <div class="content">
            <div class="title">${level.title}</div>
            <div class="points">Points: ${level.points}</div>
            <div class="tags">
                ${level.tags.map(tag => `<span class="tag">${tag}</span>`).join('')}
            </div>
        </div>
    `;

    levelList.appendChild(card);
});
</script>

</body>
</html>
